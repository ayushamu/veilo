<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AMU Connect - Identity Selection</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Hanken+Grotesk:wght@600;700;800&amp;family=Geist:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-fixed-dim": "#4edea3",
                    "surface-variant": "#333539",
                    "on-primary-fixed-variant": "#005236",
                    "secondary": "#d0bcff",
                    "tertiary-fixed": "#d8e2ff",
                    "on-secondary-fixed-variant": "#5516be",
                    "tertiary": "#adc6ff",
                    "on-surface-variant": "#bbcabf",
                    "on-error-container": "#ffdad6",
                    "on-secondary-container": "#c4abff",
                    "surface-bright": "#37393e",
                    "background": "#111317",
                    "surface-container-lowest": "#0c0e12",
                    "surface": "#111317",
                    "outline": "#86948a",
                    "on-primary-container": "#00422b",
                    "on-tertiary-fixed": "#001a42",
                    "on-error": "#690005",
                    "surface-dim": "#111317",
                    "secondary-container": "#571bc1",
                    "surface-container-low": "#1a1c20",
                    "on-primary": "#003824",
                    "error": "#ffb4ab",
                    "on-tertiary-container": "#00367a",
                    "outline-variant": "#3c4a42",
                    "surface-container": "#1e2024",
                    "on-background": "#e2e2e8",
                    "surface-tint": "#4edea3",
                    "surface-container-highest": "#333539",
                    "on-surface": "#e2e2e8",
                    "on-secondary-fixed": "#23005c",
                    "primary": "#4edea3",
                    "error-container": "#93000a",
                    "on-tertiary": "#002e6a",
                    "inverse-surface": "#e2e2e8",
                    "tertiary-fixed-dim": "#adc6ff",
                    "inverse-on-surface": "#2f3035",
                    "surface-container-high": "#282a2e",
                    "secondary-fixed": "#e9ddff",
                    "on-secondary": "#3c0091",
                    "primary-container": "#10b981",
                    "on-primary-fixed": "#002113",
                    "inverse-primary": "#006c49",
                    "on-tertiary-fixed-variant": "#004395",
                    "tertiary-container": "#71a1ff",
                    "primary-fixed": "#6ffbbe",
                    "secondary-fixed-dim": "#d0bcff"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "spacing": {
                    "xs": "0.5rem",
                    "margin-mobile": "1.25rem",
                    "sm": "1rem",
                    "md": "1.5rem",
                    "gutter": "1rem",
                    "xl": "3rem",
                    "lg": "2rem",
                    "base": "4px"
            },
            "fontFamily": {
                    "label-sm": ["Geist"],
                    "body-md": ["Inter"],
                    "headline-md": ["Hanken Grotesk"],
                    "display-lg": ["Hanken Grotesk"],
                    "label-md": ["Geist"],
                    "headline-md-mobile": ["Hanken Grotesk"],
                    "body-lg": ["Inter"]
            },
            "fontSize": {
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                    "headline-md-mobile": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(26, 29, 35, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(60, 74, 66, 0.3);
        }
        .primary-glow {
            box-shadow: 0 0 20px rgba(78, 222, 163, 0.15);
        }
        .active-gender {
            background: rgba(78, 222, 163, 0.1);
            border-color: #4edea3;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen font-body-md selection:bg-primary/30">
<!-- Top AppBar (JSON Derived) -->
<header class="bg-surface/80 dark:bg-surface/80 backdrop-blur-md border-b border-outline-variant/30 docked full-width top-0 sticky z-50">
<div class="flex items-center justify-between px-margin-mobile h-16 w-full max-w-7xl mx-auto">
<button class="text-primary dark:text-primary-fixed-dim hover:bg-surface-variant/50 transition-colors p-2 rounded-full active:scale-95 duration-150">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-headline-md-mobile font-headline-md-mobile font-bold text-primary dark:text-primary-fixed-dim">AMU Connect</h1>
<button class="text-primary dark:text-primary-fixed-dim hover:bg-surface-variant/50 transition-colors p-2 rounded-full active:scale-95 duration-150">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="max-w-md mx-auto px-margin-mobile pt-8 pb-24 flex flex-col items-center">
<!-- Hero Text -->
<div class="text-center mb-10">
<h2 class="text-display-lg font-display-lg text-on-surface mb-2">Who are you today?</h2>
<p class="text-body-md font-body-md text-on-surface-variant">Pick a gender to generate your unique anonymous identity.</p>
</div>
<!-- Identity Visualizer Section -->
<div class="relative w-full flex flex-col items-center mb-12">
<!-- Background Decorative Glow -->
<div class="absolute -z-10 w-64 h-64 bg-primary/10 blur-[80px] rounded-full"></div>
<!-- Avatar Container -->
<div class="animate-float relative w-48 h-48 rounded-full glass-card flex items-center justify-center border-2 border-primary/20 primary-glow mb-6 transition-all duration-500 overflow-hidden" id="avatar-container">
<span class="text-8xl select-none" id="avatar-emoji">🦊</span>
<!-- Inner Reflection/Highlight -->
<div class="absolute inset-0 bg-gradient-to-tr from-transparent via-white/5 to-white/10 pointer-events-none"></div>
</div>
<!-- Nickname Display -->
<div class="text-center">
<span class="inline-block px-3 py-1 bg-surface-container-high rounded-full border border-outline-variant/50 mb-2">
<span class="text-label-sm font-label-sm text-primary tracking-widest uppercase">Identity Link</span>
</span>
<h3 class="text-headline-md font-headline-md text-on-surface tracking-tight" id="avatar-nickname">Emerald Falcon</h3>
</div>
<!-- Shuffle Identity (Ghost Button) -->
</div>
<!-- Gender Options Grid -->
<div class="w-full grid grid-cols-3 gap-3 mb-10">
<button class="gender-btn glass-card p-4 flex flex-col items-center gap-2 rounded-xl transition-all hover:border-primary/50 group active:scale-95" onclick="selectGender('Male', this)">
<div class="w-10 h-10 rounded-lg bg-surface-container flex items-center justify-center group-hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary">male</span>
</div>
<span class="text-label-md font-label-md text-on-surface-variant group-hover:text-on-surface">Male</span>
</button>
<button class="gender-btn glass-card p-4 flex flex-col items-center gap-2 rounded-xl transition-all hover:border-primary/50 group active:scale-95" onclick="selectGender('Female', this)">
<div class="w-10 h-10 rounded-lg bg-surface-container flex items-center justify-center group-hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary">female</span>
</div>
<span class="text-label-md font-label-md text-on-surface-variant group-hover:text-on-surface">Female</span>
</button>
<button class="gender-btn glass-card p-4 flex flex-col items-center gap-2 rounded-xl transition-all hover:border-primary/50 group active:scale-95" onclick="selectGender('Non-Binary', this)">
<div class="w-10 h-10 rounded-lg bg-surface-container flex items-center justify-center group-hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary">transgender</span>
</div>
<span class="text-label-md font-label-md text-on-surface-variant group-hover:text-on-surface">Other</span>
</button>
</div>
<!-- Action Button -->
<div class="w-full mt-auto">
<button class="w-full py-4 bg-primary text-on-primary rounded-xl font-headline-md shadow-lg shadow-primary/20 hover:bg-primary-container active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                Enter AMU Connect
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</main>
<!-- Decorative Bottom Gradient for Depth -->
<div class="fixed bottom-0 left-0 right-0 h-32 bg-gradient-to-t from-background to-transparent pointer-events-none z-40"></div>
<script>
        const adjectives = ['Emerald', 'Midnight', 'Silent', 'Lunar', 'Cosmic', 'Golden', 'Shadow', 'Azure', 'Neon', 'Velvet', 'Mystic', 'Iron', 'Crimson', 'Storm', 'Zenith'];
        const nouns = ['Falcon', 'Leopard', 'Panther', 'Eagle', 'Wolf', 'Dragon', 'Cobra', 'Phoenix', 'Raven', 'Tiger', 'Lynx', 'Griffin', 'Viper', 'Owl', 'Stag'];
        const emojis = ['🦊', '🐱', '🐉', '🐼', '🐯', '🦁', '🐸', '🐨', '🦄', '🦅', '🦈', '🦋', '🦉', '🦚', '🦑'];

        const avatarEmoji = document.getElementById('avatar-emoji');
        const avatarNickname = document.getElementById('avatar-nickname');
        const shuffleBtn = document.getElementById('shuffle-btn');
        const avatarContainer = document.getElementById('avatar-container');

        function generateIdentity() {
            // Trigger Animation
            avatarContainer.classList.add('scale-75', 'opacity-0', 'rotate-12');
            
            setTimeout(() => {
                const adj = adjectives[Math.floor(Math.random() * adjectives.length)];
                const noun = nouns[Math.floor(Math.random() * nouns.length)];
                const emoji = emojis[Math.floor(Math.random() * emojis.length)];

                avatarEmoji.textContent = emoji;
                avatarNickname.textContent = `${adj} ${noun}`;
                
                avatarContainer.classList.remove('scale-75', 'opacity-0', 'rotate-12');
            }, 300);
        }

        function selectGender(gender, element) {
            // Clear existing active states
            document.querySelectorAll('.gender-btn').forEach(btn => {
                btn.classList.remove('active-gender');
            });
            // Set active state
            element.classList.add('active-gender');
            // Shuffle identity on selection change
            generateIdentity();
        }

        shuffleBtn.addEventListener('click', generateIdentity);

        // Initial generation
        generateIdentity();
    </script>
</body></html>
